<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的订单 · 知诚星辰智能</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0a0a0f; --surface: #101018; --surface-2: #181825; --border: #2a2a45;
  --text: #e8e8f0; --text-2: #9898b8; --text-3: #606080;
  --accent: #6c5ce7; --accent-soft: #a29bfe; --accent-glow: rgba(108,92,231,0.3);
  --radius: 16px; --radius-sm: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Noto Sans SC',-apple-system,sans-serif;
  background:var(--ink); color:var(--text); line-height:1.6;
}
#stars-canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }
.page { position:relative; z-index:1; max-width:900px; margin:0 auto; padding:40px 20px; }
.nav-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:40px; }
.nav-top .logo { font-weight:700; font-size:18px; background:linear-gradient(135deg,var(--accent-soft),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.nav-top a { color:var(--text-2); text-decoration:none; font-size:14px; transition:color 0.2s; }
.nav-top a:hover { color:var(--accent-soft); }
h1 { font-size:28px; font-weight:700; margin-bottom:8px; }
.sub { color:var(--text-2); font-size:14px; margin-bottom:32px; }
.order-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:24px; margin-bottom:16px;
  transition:all 0.2s;
}
.order-card:hover { border-color:var(--accent); }
.order-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.order-id { font-size:13px; color:var(--accent-soft); font-weight:600; }
.order-date { font-size:12px; color:var(--text-3); }
.status {
  display:inline-block; padding:4px 10px; border-radius:100px;
  font-size:12px; font-weight:600;
}
.status.pending { background:rgba(255,193,7,0.12); color:#ffc107; }
.status.paid { background:rgba(76,175,80,0.12); color:#4caf50; }
.status.shipped { background:rgba(33,150,243,0.12); color:#2196f3; }
.status.delivered { background:rgba(108,92,231,0.12); color:var(--accent-soft); }
.order-body { display:flex; gap:16px; align-items:center; }
.order-body .info { flex:1; }
.order-body .info .product { font-weight:600; font-size:14px; }
.order-body .info .detail { color:var(--text-2); font-size:13px; margin-top:4px; }
.order-body .amount { font-size:18px; font-weight:700; color:var(--accent-soft); }
.empty {
  text-align:center; padding:80px 20px;
}
.empty .emoji { font-size:48px; margin-bottom:16px; }
.empty p { color:var(--text-2); font-size:15px; margin-bottom:20px; }
.loading-state { text-align:center; padding:60px; color:var(--text-2); }
.loading-state .spinner { display:inline-block; width:24px; height:24px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin-bottom:12px; }
@keyframes spin { to {transform:rotate(360deg);} }
</style>
</head>
<body>
<canvas id="stars-canvas"></canvas>
<div class="page">
  <div class="nav-top">
    <div class="logo">✦ 知诚星辰</div>
    <div style="display:flex;gap:16px;align-items:center;">
      <a href="/account.html">个人中心</a>
      <a href="/">← 返回首页</a>
    </div>
  </div>
  <h1>我的订单</h1>
  <p class="sub">查看你的机器人订单状态</p>

  <div id="loadingState" class="loading-state">
    <div class="spinner"></div>
    <p>加载订单中...</p>
  </div>

  <div id="ordersList"></div>
  <div id="emptyState" class="empty" style="display:none;">
    <div class="emoji">📦</div>
    <p>还没有订单，快去下单吧！</p>
    <a href="/" style="display:inline-block;padding:12px 32px;border-radius:8px;background:var(--accent);color:#fff;text-decoration:none;font-weight:600;">去首页看看</a>
  </div>
</div>

<script>
if (!localStorage.getItem('zcx_token')) window.location.href = '/login.html';

const c = document.getElementById('stars-canvas'), cx = c.getContext('2d');
let st = [];
function rs() { c.width = window.innerWidth; c.height = window.innerHeight; }
rs(); window.addEventListener('resize', rs);
for (let i = 0; i < 80; i++) st.push({x:Math.random()*c.width, y:Math.random()*c.height, r:Math.random()*1.5+0.2, a:Math.random()*0.6+0.2, s:Math.random()*0.02+0.005, p:Math.random()*6.28});
function dr(t) {
  cx.clearRect(0, 0, c.width, c.height);
  for (const s of st) { const tw = 0.5+0.5*Math.sin(t*s.s+s.p); cx.beginPath(); cx.arc(s.x, s.y, s.r, 0, 6.28); cx.fillStyle=`rgba(240,230,255,${s.a*tw})`; cx.fill(); }
  requestAnimationFrame(dr);
}
dr(0);

const statusMap = {
  pending: { label: '待支付', cls: 'pending' },
  paid: { label: '已支付', cls: 'paid' },
  shipped: { label: '已发货', cls: 'shipped' },
  delivered: { label: '已签收', cls: 'delivered' },
};

async function loadOrders() {
  try {
    const r = await fetch('/api/orders', { headers: { 'Authorization': 'Bearer ' + localStorage.getItem('zcx_token') } });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error);

    document.getElementById('loadingState').style.display = 'none';
    const list = document.getElementById('ordersList');

    if (!d.orders || d.orders.length === 0) {
      document.getElementById('emptyState').style.display = '';
      return;
    }

    list.innerHTML = d.orders.map(o => {
      const st = statusMap[o.status] || { label: o.status, cls: 'pending' };
      const date = new Date(o.created_at).toLocaleString('zh-CN', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
      const payMethod = o.payment_method === 'alipay' ? '💙 支付宝' : o.payment_method === 'wechat' ? '💚 微信' : '';
      return `<div class="order-card">
        <div class="order-header">
          <span class="order-id">${o.id}</span>
          <span class="order-date">${date}</span>
        </div>
        <div class="order-body">
          <div class="info">
            <div class="product">${o.product} × ${o.quantity}</div>
            <div class="detail">收货人：${o.receiver_name} · ${o.receiver_phone}</div>
            <div class="detail">地址：${o.receiver_address}</div>
            ${payMethod ? `<div class="detail">支付：${payMethod}</div>` : ''}
          </div>
          <div style="text-align:right;">
            <div class="amount">¥${Number(o.total_price).toLocaleString()}</div>
            <span class="status ${st.cls}">${st.label}</span>
          </div>
        </div>
      </div>`;
    }).join('');

  } catch (e) {
    document.getElementById('loadingState').innerHTML = `<p style="color:#ff6b6b;">加载失败：${e.message}</p>`;
  }
}
loadOrders();
</script>
</body>
</html>
