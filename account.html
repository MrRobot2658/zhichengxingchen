<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人中心 · 知诚星辰智能</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0a0a0f; --surface: #101018; --surface-2: #181825; --border: #2a2a45;
  --text: #e8e8f0; --text-2: #9898b8; --text-3: #606080;
  --accent: #6c5ce7; --accent-soft: #a29bfe; --accent-glow: rgba(108,92,231,0.3);
  --radius: 16px; --radius-sm: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans SC',-apple-system,sans-serif; background:var(--ink); color:var(--text); line-height:1.6; }
canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }
.page { position:relative; z-index:1; max-width:960px; margin:0 auto; padding:30px 20px 80px; }
.nav-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; }
.nav-top .logo { font-weight:700; font-size:18px; background:linear-gradient(135deg,var(--accent-soft),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.nav-top a { color:var(--text-2); text-decoration:none; font-size:14px; transition:color 0.2s; }
.nav-top a:hover { color:var(--accent-soft); }
.user-header { display:flex; align-items:center; gap:16px; padding:24px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:28px; }
.user-avatar { width:56px; height:56px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent-soft)); display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:700; color:#fff; flex-shrink:0; }
.user-info .name { font-size:18px; font-weight:700; }
.user-info .email { font-size:13px; color:var(--text-2); margin-top:2px; }
.tabs { display:flex; gap:4px; margin-bottom:24px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:4px; }
.tab { flex:1; padding:12px; text-align:center; font-size:14px; font-weight:500; color:var(--text-2); cursor:pointer; border-radius:8px; transition:all 0.2s; }
.tab:hover { color:var(--text); background:var(--surface-2); }
.tab.active { color:var(--accent-soft); background:rgba(108,92,231,0.12); }
.tab-content { display:none; }
.tab-content.active { display:block; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; margin-bottom:16px; transition:border 0.2s; }
.card:hover { border-color:#3a3a55; }
.clickable { cursor:pointer; }
.clickable:hover { border-color:var(--accent); }
.order-header, .addr-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.order-id { color:var(--accent-soft); font-weight:600; font-size:13px; }
.order-date { color:var(--text-3); font-size:12px; }
.status-badge { display:inline-block; padding:3px 10px; border-radius:100px; font-size:12px; font-weight:600; }
.status-badge.pending { background:rgba(255,193,7,0.12); color:#ffc107; }
.status-badge.paid { background:rgba(76,175,80,0.12); color:#4caf50; }
.status-badge.shipped { background:rgba(33,150,243,0.12); color:#2196f3; }
.status-badge.delivered { background:rgba(108,92,231,0.12); color:var(--accent-soft); }
.status-badge.cancelled { background:rgba(255,107,107,0.12); color:#ff6b6b; }
.order-body, .addr-body { display:flex; justify-content:space-between; align-items:center; }
.order-body .info .product { font-weight:600; font-size:14px; }
.order-body .info .detail { color:var(--text-2); font-size:13px; margin-top:2px; }
.order-body .amount { font-size:17px; font-weight:700; color:var(--accent-soft); }
.empty-state { text-align:center; padding:60px 20px; }
.empty-state .e { font-size:40px; margin-bottom:12px; }
.empty-state p { color:var(--text-2); font-size:14px; margin-bottom:16px; }
.btn-sm { padding:6px 14px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--text-2); font-size:12px; cursor:pointer; transition:0.2s; }
.btn-sm:hover { border-color:var(--accent); color:var(--text); }
.btn-sm.danger { border-color:rgba(255,107,107,0.3); color:#ff6b6b; }
.btn-sm.danger:hover { background:rgba(255,107,107,0.1); }
.form-group { margin-bottom:14px; }
.form-group label { display:block; font-size:13px; font-weight:600; color:var(--text-2); margin-bottom:6px; }
.form-group input { width:100%; padding:10px 12px; border-radius:8px; border:1px solid var(--border); background:var(--surface-2); color:var(--text); font-size:14px; outline:none; transition:border 0.2s; }
.form-group input:focus { border-color:var(--accent); }
.btn-full { width:100%; padding:13px; border-radius:8px; background:var(--accent); color:#fff; font-weight:600; font-size:15px; border:none; cursor:pointer; transition:all 0.2s; }
.btn-full:hover { background:var(--accent-soft); box-shadow:0 4px 20px var(--accent-glow); }
.alert { padding:12px 14px; border-radius:8px; font-size:13px; margin-bottom:14px; display:none; }
.alert.error { display:block; background:rgba(255,107,107,0.1); border:1px solid rgba(255,107,107,0.3); color:#ff6b6b; }
.alert.success { display:block; background:rgba(108,92,231,0.1); border:1px solid rgba(108,92,231,0.3); color:var(--accent-soft); }
.addr-item { display:flex; justify-content:space-between; align-items:center; padding:16px 0; border-bottom:1px solid var(--border); }
.addr-item:last-child { border-bottom:none; }
.addr-item .main .name { font-weight:600; font-size:14px; }
.addr-item .main .addr { color:var(--text-2); font-size:13px; margin-top:2px; }
.default-badge { font-size:11px; padding:2px 8px; border-radius:100px; background:rgba(108,92,231,0.12); color:var(--accent-soft); margin-left:6px; }
.loading { text-align:center; padding:40px; color:var(--text-2); }
.loading .spinner { width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 10px; }
@keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>
<canvas></canvas>
<div class="page">
  <div class="nav-top">
    <div class="logo">✦ 知诚星辰</div>
    <div style="display:flex;gap:16px;align-items:center;">
      <a href="/orders.html">我的订单</a>
      <a href="/">← 首页</a>
    </div>
  </div>

  <!-- User Header -->
  <div class="user-header">
    <div class="user-avatar" id="avatarLetter">君</div>
    <div class="user-info">
      <div class="name" id="userName">加载中...</div>
      <div class="email" id="userEmail"></div>
    </div>
    <div style="margin-left:auto;"><a href="/" style="color:var(--text-2);text-decoration:none;font-size:13px;">← 首页</a></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab(0)">📦 我的订单</div>
    <div class="tab" onclick="switchTab(1)">📍 收货地址</div>
    <div class="tab" onclick="switchTab(2)">⚙️ 账号设置</div>
  </div>

  <!-- Tab 0: Orders -->
  <div class="tab-content active" id="tabOrders">
    <div id="ordersLoading" class="loading"><div class="spinner"></div><p>加载订单...</p></div>
    <div id="ordersList"></div>
    <div id="ordersEmpty" class="empty-state" style="display:none"><div class="e">📦</div><p>还没有订单</p><a href="/" class="btn-sm">去逛逛</a></div>
  </div>

  <!-- Tab 1: Addresses -->
  <div class="tab-content" id="tabAddress">
    <div class="card" style="margin-bottom:16px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h2 style="font-size:16px;font-weight:700;">收货地址</h2>
        <button class="btn-sm" onclick="showAddAddr()">+ 添加地址</button>
      </div>
      <div id="addrList"></div>
      <div id="addrEmpty" class="empty-state" style="display:none"><div class="e">📍</div><p>还没有收货地址</p></div>
    </div>
    <div id="addrForm" style="display:none;" class="card">
      <h2 style="font-size:16px;font-weight:700;margin-bottom:14px;" id="addrFormTitle">添加地址</h2>
      <div class="form-group"><label>收货人</label><input type="text" id="addrName" placeholder="姓名"></div>
      <div class="form-group"><label>手机号</label><input type="tel" id="addrPhone" placeholder="手机号"></div>
      <div class="form-group"><label>地区</label><input type="text" id="addrRegion" placeholder="省/市/区"></div>
      <div class="form-group"><label>详细地址</label><input type="text" id="addrDetail" placeholder="街道/门牌号"></div>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-2);margin-bottom:14px;">
        <input type="checkbox" id="addrDefault"> 设为默认地址
      </label>
      <div class="alert error" id="addrErr">请填写完整信息</div>
      <button class="btn-full" onclick="saveAddress()">保存地址</button>
    </div>
  </div>

  <!-- Tab 2: Settings -->
  <div class="tab-content" id="tabSettings">
    <div class="card">
      <h2 style="font-size:16px;font-weight:700;margin-bottom:16px;">修改密码</h2>
      <div class="form-group"><label>当前密码</label><input type="password" id="oldPw" placeholder="输入当前密码"></div>
      <div class="form-group"><label>新密码</label><input type="password" id="newPw" placeholder="至少6位"></div>
      <div class="form-group"><label>确认新密码</label><input type="password" id="confirmPw" placeholder="再次输入新密码"></div>
      <div class="alert error" id="pwErr">密码不匹配</div>
      <div class="alert success" id="pwOk">密码修改成功</div>
      <button class="btn-full" onclick="changePassword()">保存修改</button>
    </div>
    <div class="card" style="text-align:center;padding:20px;">
      <button class="btn-sm danger" onclick="if(confirm('确定退出？')){localStorage.removeItem('zcx_token');window.location.href='/';}" style="padding:8px 20px;">退出登录</button>
    </div>
  </div>
</div>

<script>
if (!localStorage.getItem('zcx_token')) window.location.href = '/login.html';

const c = document.querySelector('canvas'), cx = c.getContext('2d');
let st = [];
function rs() { c.width = window.innerWidth; c.height = window.innerHeight; }
rs(); window.addEventListener('resize', rs);
for (let i = 0; i < 80; i++) st.push({x:Math.random()*c.width, y:Math.random()*c.height, r:Math.random()*1.5+0.2, a:Math.random()*0.6+0.2, s:Math.random()*0.02+0.005, p:Math.random()*6.28});
function dr(t) { cx.clearRect(0,0,c.width,c.height); for(const s of st){const tw=0.5+0.5*Math.sin(t*s.s+s.p);cx.beginPath();cx.arc(s.x,s.y,s.r,0,6.28);cx.fillStyle=`rgba(240,230,255,${s.a*tw})`;cx.fill()}requestAnimationFrame(dr); }
dr(0);

const API = '/api';
function token() { return localStorage.getItem('zcx_token'); }

async function apiFetch(path, opts = {}) {
  const h = { 'Content-Type': 'application/json', ...opts.headers };
  h['Authorization'] = 'Bearer ' + token();
  const r = await fetch(API + path, { ...opts, headers: h });
  const d = await r.json();
  if (!r.ok) { if (r.status === 401) { localStorage.removeItem('zcx_token'); window.location.href = '/login.html'; } throw new Error(d.error || '请求失败'); }
  return d;
}

const statusMap = { pending:['待支付','pending'], paid:['已支付','paid'], shipped:['已发货','shipped'], delivered:['已签收','delivered'], cancelled:['已取消','cancelled'] };

// ── Init ──
let userData = null;
async function init() {
  try {
    userData = await apiFetch('/me');
    const u = userData.user;
    document.getElementById('avatarLetter').textContent = (u.name || u.email)[0];
    document.getElementById('userName').textContent = u.name || u.email;
    document.getElementById('userEmail').textContent = u.email;
    loadOrders();
    loadAddresses();
  } catch (e) { document.getElementById('userName').textContent = '加载失败'; }
}

// ── Tabs ──
function switchTab(i) {
  document.querySelectorAll('.tab').forEach((t, idx) => t.classList.toggle('active', idx === i));
  document.querySelectorAll('.tab-content').forEach((t, idx) => t.classList.toggle('active', idx === i));
}

// ── Orders ──
async function loadOrders() {
  try {
    const d = await apiFetch('/orders');
    document.getElementById('ordersLoading').style.display = 'none';
    const list = document.getElementById('ordersList');
    if (!d.orders || !d.orders.length) { document.getElementById('ordersEmpty').style.display = ''; return; }
    list.innerHTML = d.orders.map(o => {
      const s = statusMap[o.status] || ['未知','pending'];
      const date = new Date(o.created_at).toLocaleDateString('zh-CN');
      return `<div class="card clickable" onclick="showOrderDetail('${o.id}')">
        <div class="order-header">
          <span class="order-id">${o.id}</span>
          <span class="order-date">${date}</span>
        </div>
        <div class="order-body">
          <div class="info">
            <div class="product">${o.product} × ${o.quantity}</div>
            <div class="detail">${o.receiver_name} · ${o.receiver_phone}</div>
          </div>
          <div style="text-align:right;">
            <div class="amount">¥${Number(o.total_price).toLocaleString()}</div>
            <span class="status-badge ${s[1]}">${s[0]}</span>
          </div>
        </div>
      </div>`;
    }).join('');
  } catch (e) { document.getElementById('ordersLoading').innerHTML = `<p style="color:#ff6b6b;">${e.message}</p>`; }
}

// ── Order Detail ──
let currentDetailOrder = null;
async function showOrderDetail(orderId) {
  try {
    const d = await apiFetch(`/orders/${orderId}`);
    const o = d.order;
    currentDetailOrder = o;
    const s = statusMap[o.status] || ['未知','pending'];
    const date = new Date(o.created_at).toLocaleString('zh-CN');
    document.getElementById('ordersList').innerHTML = `
      <div class="card">
        <div style="display:flex;justify-content:space-between;margin-bottom:14px;">
          <span class="order-id">${o.id}</span>
          <span class="status-badge ${s[1]}">${s[0]}</span>
        </div>
        <table style="width:100%;font-size:14px;border-collapse:collapse;">
          <tr><td style="color:var(--text-2);padding:6px 0;">商品</td><td>${o.product} × ${o.quantity}</td></tr>
          <tr><td style="color:var(--text-2);padding:6px 0;">金额</td><td style="font-weight:700;">¥${Number(o.total_price).toLocaleString()}</td></tr>
          <tr><td style="color:var(--text-2);padding:6px 0;">下单时间</td><td>${date}</td></tr>
          <tr><td style="color:var(--text-2);padding:6px 0;">收货人</td><td>${o.receiver_name}</td></tr>
          <tr><td style="color:var(--text-2);padding:6px 0;">电话</td><td>${o.receiver_phone}</td></tr>
          <tr><td style="color:var(--text-2);padding:6px 0;">地址</td><td>${o.receiver_address}</td></tr>
          ${o.note ? `<tr><td style="color:var(--text-2);padding:6px 0;">备注</td><td>${o.note}</td></tr>` : ''}
          ${o.payment_method ? `<tr><td style="color:var(--text-2);padding:6px 0;">支付</td><td>${o.payment_method === 'alipay' ? '💙 支付宝' : '💚 微信'}</td></tr>` : ''}
        </table>
        ${o.status === 'pending' || o.status === 'paid' ? `
        <div style="margin-top:16px;display:flex;gap:10px;">
          <button class="btn-sm danger" onclick="cancelOrder('${o.id}')">取消订单</button>
          <button class="btn-sm" onclick="loadOrders()">← 返回</button>
        </div>` : `
        <div style="margin-top:16px;"><button class="btn-sm" onclick="loadOrders()">← 返回</button></div>`}
      </div>`;
  } catch(e) { alert(e.message); }
}

async function cancelOrder(orderId) {
  if (!confirm('确定取消这个订单？')) return;
  try {
    await apiFetch(`/orders/${orderId}/cancel`, { method: 'POST', body: '{}' });
    alert('订单已取消');
    loadOrders();
  } catch(e) { alert(e.message); }
}

// ── Addresses ──
async function loadAddresses() {
  try {
    const d = await apiFetch('/addresses');
    const list = document.getElementById('addrList');
    if (!d.addresses || !d.addresses.length) { document.getElementById('addrEmpty').style.display = ''; list.innerHTML = ''; return; }
    document.getElementById('addrEmpty').style.display = 'none';
    list.innerHTML = d.addresses.map(a => `
      <div class="addr-item">
        <div class="main">
          <div class="name">${a.name} ${a.is_default ? '<span class="default-badge">默认</span>' : ''}</div>
          <div class="addr">${a.address} ${a.detail || ''} · ${a.phone}</div>
        </div>
        <button class="btn-sm danger" onclick="deleteAddress('${a.id}')">删除</button>
      </div>
    `).join('');
  } catch(e) {}
}

function showAddAddr() {
  document.getElementById('addrForm').style.display = '';
  document.getElementById('addrFormTitle').textContent = '添加地址';
  ['addrName','addrPhone','addrRegion','addrDetail'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('addrDefault').checked = false;
}

async function saveAddress() {
  const name = document.getElementById('addrName').value.trim();
  const phone = document.getElementById('addrPhone').value.trim();
  const address = document.getElementById('addrRegion').value.trim();
  const detail = document.getElementById('addrDetail').value.trim();
  if (!name || !phone || !address) { document.getElementById('addrErr').style.display = 'block'; return; }
  try {
    await apiFetch('/addresses', { method: 'POST', body: JSON.stringify({ name, phone, address, detail, is_default: document.getElementById('addrDefault').checked }) });
    document.getElementById('addrForm').style.display = 'none';
    loadAddresses();
  } catch(e) { document.getElementById('addrErr').textContent = e.message; document.getElementById('addrErr').style.display = 'block'; }
}

async function deleteAddress(id) {
  if (!confirm('确定删除这个地址？')) return;
  try { await apiFetch(`/addresses/${id}`, { method: 'DELETE' }); loadAddresses(); }
  catch(e) { alert(e.message); }
}

// ── Password ──
async function changePassword() {
  const oldPw = document.getElementById('oldPw').value;
  const newPw = document.getElementById('newPw').value;
  const confirmPw = document.getElementById('confirmPw').value;
  document.getElementById('pwErr').style.display = 'none';
  document.getElementById('pwOk').style.display = 'none';
  if (!oldPw || !newPw || newPw !== confirmPw) { document.getElementById('pwErr').textContent = '请正确填写所有密码字段'; document.getElementById('pwErr').style.display = 'block'; return; }
  if (newPw.length < 6) { document.getElementById('pwErr').textContent = '新密码至少6位'; document.getElementById('pwErr').style.display = 'block'; return; }
  try {
    await apiFetch('/auth/change-password', { method: 'POST', body: JSON.stringify({ oldPassword: oldPw, newPassword: newPw }) });
    document.getElementById('pwOk').style.display = 'block';
    document.getElementById('oldPw').value = ''; document.getElementById('newPw').value = ''; document.getElementById('confirmPw').value = '';
  } catch(e) { document.getElementById('pwErr').textContent = e.message; document.getElementById('pwErr').style.display = 'block'; }
}

init();
</script>
</body>
</html>
